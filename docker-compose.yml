
services:
  patient-service-db:
    image: postgres:16
    container_name: patient-service-db
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
    - "5433:5432"
    volumes:
      - /Users/divyagj/Downloads/db_volumes/patient-service-db:/var/lib/postgresql/data
    networks:
      - internal

  patient-service:
    image: 'patient-service:latest'
    container_name: patient-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-service-db:5432/db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9090
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092 # Kafka bootstrap servers configuration for the Patient Service to connect to the Kafka broker
    depends_on:
      - patient-service-db
    networks:
      - internal

  billing-service:
    image: 'billing-service:latest'
    container_name: billing-service
    ports:
    - "9090:9090" # Host gRPC -> Container gRPC
    - "4001:4001" # Host HTTP -> Container HTTP
    networks:
      - internal

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CLUSTER_ID: 'Mk3OEYBSD34fcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - internal

  analyticsservice:
     image: analytics-service:latest
     container_name: analyticsservice
     ports:
      - "4002:4002"
     environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # This allows it to find the Kafka container inside the Docker network
     networks:
      - internal  

  api-gateway:
    build: ./api-gateway
    image: api-gateway:latest
    container_name: api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:4005
    ports:
      - "8080:8080"
    depends_on:
      - patient-service
    networks:
      - internal

  auth-service-db:
    image: postgres:16
    container_name: auth-service-db
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
    - "5431:5432"
    volumes:
      - /Users/divyagj/Downloads/db_volumes/auth-service-db:/var/lib/postgresql/data
    networks:
      - internal

  auth-service:
    build: ./auth-service
    image: 'auth-service:latest'
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-db:5432/db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password 
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: vV7m6L8xP9QkR3tW5zB2yN5vC8xM1zP4qS7wV0zN3mE=
    depends_on:
      - auth-service-db
    networks:
      - internal

  
networks:
  internal:
    driver: bridge

volumes:
  kafka_data:
    driver: local